<div class="fixed bottom-8 right-8 z-[100] flex flex-col items-end space-y-4">
  
  <!-- Бабл с текстом (показываем по сигналу) -->
  @if (isOpen()) {
<!-- Внутри @if (isOpen()) -->
<div class="max-w-[300px] bg-white p-6 rounded-[2.5rem] shadow-2xl border border-indigo-50 relative">
  
  <!-- Сообщение от Диплодока -->
  <p class="text-slate-600 text-sm leading-relaxed italic mb-4">
    {{ ai.lastMessage() }}
  </p>

  <!-- Поле ввода (наш новый "пульт") -->
  <div class="flex items-center gap-2 mt-4 bg-slate-50 p-2 rounded-full border border-slate-100 focus-within:border-indigo-300 transition-colors">
    <input 
      #userQuery
      (keyup.enter)="send(userQuery)"
      type="text" 
      placeholder="Спроси бро..." 
      class="flex-1 bg-transparent border-none text-xs px-3 focus:outline-none text-slate-700"
    >
    <button 
      (click)="send(userQuery)"
      [disabled]="ai.isLoading()"
      class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center hover:bg-indigo-700 disabled:opacity-50"
    >
      <span class="text-xs">🚀</span>
    </button>
  </div>

  <!-- Индикатор загрузки -->
  @if (ai.isLoading()) {
    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full uppercase font-bold tracking-tighter shadow-sm animate-pulse">
      Диплодок думает...
    </div>
  }

  <div class="absolute -bottom-2 right-8 w-4 h-4 bg-white rotate-45 border-r border-b border-indigo-50"></div>
</div>

  }

  <!-- Кнопка-иконка (наша "кнопка запуска") -->
  <button (click)="toggleChat()" 
          class="w-16 h-16 bg-indigo-600 rounded-full shadow-lg flex items-center justify-center text-3xl hover:scale-110 transition-all active:scale-95 hover:rotate-12">
    @if (ai.isLoading()) {
       <span class="animate-spin text-2xl">⚙️</span>
    } @else {
       🦕
    }
  </button>
</div>
