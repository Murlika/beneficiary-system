<div class="max-w-2xl mx-auto mt-10">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
    <h2 class="text-2xl font-black text-slate-800 mb-8">
      {{ isEdit ? '📜 Редактировать данные' : '🥚 Новые данные' }}
    </h2>

    <div class="space-y-6">
      <!-- ТИП -->
      <div class="flex gap-4 p-2 bg-slate-50 rounded-2xl">
        <label class="flex-1 text-center py-2 rounded-xl cursor-pointer transition-all" 
               [class.bg-white]="form.value.type === 'person'" [class.shadow-sm]="form.value.type === 'person'">
          <input type="radio" formControlName="type" value="person" class="hidden">
          <span class="text-xs font-bold uppercase tracking-widest text-slate-600">Физлицо</span>
        </label>
        
                  <label class="flex-1 text-center py-2 rounded-xl cursor-pointer transition-all" 
               [class.bg-white]="form.value.type === 'company'" [class.shadow-sm]="form.value.type === 'company'">
          <input type="radio" formControlName="type" value="company" class="hidden">
          <span class="text-xs font-bold uppercase tracking-widest text-slate-600">Юрлицо</span>
        </label>
      </div>

      <!-- ФИО -->
      <div>
        <label class="block text-[10px] uppercase font-black text-slate-400 mb-2 ml-4">Наименование / ФИО</label>
        <input type="text" formControlName="full_name" placeholder="Введите имя..."
               class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 font-medium">
      </div>

      <!-- JSON ДАННЫЕ -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] uppercase font-black text-slate-400 mb-2 ml-4">ИНН</label>
          <input type="text" formControlName="inn" class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 font-medium">
        </div>
        <div>
          <label class="block text-[10px] uppercase font-black text-slate-400 mb-2 ml-4">Телефон</label>
          <input type="text" formControlName="phone" class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 font-medium">
        </div>
      </div>
    </div>

    <div class="flex gap-4 mt-10">
      <button type="button" (click)="router.navigate(['/beneficiaries'])" 
              class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition-all">Отмена</button>
      <button type="submit" [disabled]="form.invalid"
              class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-30">
        {{ isEdit ? 'Обновить' : 'Сохранить' }}
      </button>
    </div>
  </form>
</div>
