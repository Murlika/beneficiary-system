
<tbody class="divide-y divide-slate-50">
  @for (item of services(); track item.id) {
    <tr class="hover:bg-slate-50/50 transition-colors group">
      <td class="px-8 py-5 text-sm font-medium text-slate-500">
        {{ item.service_date | date:'dd.MM.yyyy' }}
      </td>
      <td class="px-8 py-5">
        <div class="text-sm font-bold text-slate-800">{{ item.beneficiary_name }}</div>
        <div class="text-[10px] text-slate-400 uppercase tracking-tighter">ID: #{{ item.id }}</div>
      </td>
      <td class="px-8 py-5">
        <span class="text-sm text-slate-600">{{ item.service_title }}</span>
      </td>
      <td class="px-8 py-5">
        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-indigo-50 text-indigo-600 border border-indigo-100">
          {{ item.status }}
        </span>
      </td>
      <td class="px-8 py-5 text-right">
        <button class="text-slate-400 hover:text-indigo-600 transition-colors p-2">⚙️</button>
        <button class="text-slate-400 hover:text-red-500 transition-colors p-2">🗑️</button>
      </td>
    </tr>
  } @empty {

    <tr>
      <td colspan="5" class="px-8 py-20 text-center text-slate-400 italic">
        🦕 Диплодок обыскал всё, но услуг не нашел...
      </td>
    </tr>
  }
</tbody>
